services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bdcollection
      POSTGRES_PASSWORD: bdcollection
      POSTGRES_DB: bdcollection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdcollection"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bdcollection:bdcollection@db:5432/bdcollection?schema=public
      UPLOAD_DIR: /app/uploads
      NEXT_PUBLIC_APP_NAME: BD Collection
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
